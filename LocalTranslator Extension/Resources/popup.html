<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Local Translator</title>
    <link rel="stylesheet" href="popup.css" />
    <style>
      .pick-btn {
        display: block;
        width: 100%;
        padding: 12px;
        font-size: 14px;
        font-weight: 600;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        margin-bottom: 8px;
      }
      .pick-btn:hover { opacity: 0.88; }
      .pick-btn:active { opacity: 0.72; }
      .row-pair {
        display: flex;
        gap: 8px;
        margin-bottom: 14px;
      }
      .row-pair select { flex: 1; }
      .row-pair .secondary {
        cursor: pointer;
        color: var(--muted);
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Local Translator</h1>
      <p class="tagline">Offline · Apple on-device translation · <span id="build-id">build 231b43c</span></p>
    </header>

    <div class="row-pair">
      <select id="source-lang">
        <option value="auto">Auto-detect</option>
        <option value="jpn">Japanese</option>
        <option value="chi_sim">Chinese (Simplified)</option>
        <option value="chi_tra">Chinese (Traditional)</option>
      </select>
      <button id="clear-btn" class="secondary">Remove overlays</button>
    </div>

    <button id="pick-btn" class="pick-btn">Translate an image</button>

    <div class="dev-panel">
      <div class="dev-log-header">
        <span>Activity log</span>
        <button id="dev-clear-btn">Clear</button>
      </div>
      <div id="dev-log" class="dev-log"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
